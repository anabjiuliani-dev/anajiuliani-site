<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tour ✦</title>

  <!-- connect your CSS -->
  <link rel="stylesheet" href="style.css">
</head>
  <link rel="icon" type="image/png" href="images/favicon.png" />
<body>

  <!-- HEADER (this is why your nav style wasn’t working) -->
  <header class="masthead">
    <h1 class="logo">Ana Jiuliani</h1>

    <nav>
      <a href="index.html">Home</a>
    </nav>
  </header>

  <!-- TOUR CONTENT -->
  <main class="tour-container">

    <h1 class="tour-title">Come see me live!</h1>
    <p class="tour-subtitle">maybe i'm coming closer than you think</p>

    <article class="soft-block-left">
      <h3>São Paulo ✦</h3>
      <p>august 12 · cine joia</p>
      <a href="#" class="soft-button">
        tickets <span class="star">✦</span>
      </a>
      <span class="floating-star">✦</span>
    </article>

    <article class="soft-block-left">
      <h3>Rio de Janeiro ✦</h3>
      <p>august 18 · sacadura 154</p>
      <a href="#" class="soft-button">
        tickets <span class="star">✦</span>
      </a>
    </article>

  </main>
<script>
async function showGeo() {
  let country = "";
  let code = "";

  try {
    const res = await fetch("https://ipwho.is/");
    const data = await res.json();

    if (data.success) {
      country = data.country;
      code = data.country_code.toLowerCase();
    }
  } catch (e) {
    console.log("geo failed");
  }

  // if still no country → don't show (or fallback)
  if (!country) return;

  const box = document.createElement("div");
  box.className = "ana-geo";

  box.innerHTML = `
    <div class="ana-geo-inner">
      <p class="geo-main">wait… are you in ${country}? ✦</p>
      <p class="geo-sub">i might be closer than you think</p>

      <div class="actions">
        <a href="tour-${code}.html" class="go">show me</a>
        <button class="stay">not now</button>
      </div>
    </div>
  `;

  document.body.appendChild(box);

  box.querySelector(".stay").onclick = () => box.remove();
}

showGeo();
</script>
</body>
</html>
